name: CI — FitReserve

on:
  push:
    branches: [main, master, "feature/**", "fix/**"]
  pull_request:
    branches: [main, master]

jobs:
  # ─────────────────────────────────────────────
  #  Backend — Symfony 7 + PHPUnit
  # ─────────────────────────────────────────────
  backend:
    name: Backend (PHP 8.3 / Symfony 7)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0.36
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: fitreserve_test
          MYSQL_USER: fituser
          MYSQL_PASSWORD: fitpassword
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo_mysql, intl, mbstring, zip
          coverage: xdebug

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Generate JWT keys
        run: |
          mkdir -p config/jwt
          openssl genpkey -algorithm RSA -out config/jwt/private.pem -pkeyopt rsa_keygen_bits:4096 -pass pass:test_passphrase
          openssl pkey -in config/jwt/private.pem -passin pass:test_passphrase -out config/jwt/public.pem -pubout

      - name: Run migrations
        env:
          DATABASE_URL: "mysql://fituser:fitpassword@127.0.0.1:3306/fitreserve_test?serverVersion=8.0.36"
          APP_ENV: test
          APP_SECRET: test_secret_32_chars_minimum_ok
          JWT_SECRET_KEY: "%kernel.project_dir%/config/jwt/private.pem"
          JWT_PUBLIC_KEY: "%kernel.project_dir%/config/jwt/public.pem"
          JWT_PASSPHRASE: test_passphrase
        run: php bin/console doctrine:migrations:migrate --no-interaction

      - name: Load fixtures
        env:
          DATABASE_URL: "mysql://fituser:fitpassword@127.0.0.1:3306/fitreserve_test?serverVersion=8.0.36"
          APP_ENV: test
          APP_SECRET: test_secret_32_chars_minimum_ok
          JWT_SECRET_KEY: "%kernel.project_dir%/config/jwt/private.pem"
          JWT_PUBLIC_KEY: "%kernel.project_dir%/config/jwt/public.pem"
          JWT_PASSPHRASE: test_passphrase
        run: php bin/console doctrine:fixtures:load --no-interaction

      - name: Run PHPUnit tests
        env:
          DATABASE_URL: "mysql://fituser:fitpassword@127.0.0.1:3306/fitreserve_test?serverVersion=8.0.36"
          APP_ENV: test
          APP_SECRET: test_secret_32_chars_minimum_ok
          JWT_SECRET_KEY: "%kernel.project_dir%/config/jwt/private.pem"
          JWT_PUBLIC_KEY: "%kernel.project_dir%/config/jwt/public.pem"
          JWT_PASSPHRASE: test_passphrase
        run: php bin/phpunit --testdox

  # ─────────────────────────────────────────────
  #  Frontend — Vitest
  # ─────────────────────────────────────────────
  frontend:
    name: Frontend (Node 20 / Vue 3)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm test

      - name: Build production bundle
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8000

  # ─────────────────────────────────────────────
  #  Docker build check
  # ─────────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t fitreserve-backend ./backend

      - name: Build frontend image
        run: docker build -t fitreserve-frontend ./frontend

  # ─────────────────────────────────────────────
  #  Déploiement continu — production (main only)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/fitreserve
            git pull origin main
            docker compose pull
            docker compose up -d --build
            docker compose exec -T backend php bin/console doctrine:migrations:migrate --no-interaction
            docker compose exec -T backend php bin/console cache:clear
