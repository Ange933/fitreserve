version: '3.8'

services:
  db:
    image: mysql:8.0.36
    container_name: fitreserve_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-fitreserve}
      MYSQL_USER: ${DB_USER:-fituser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-fitpassword}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - fitreserve_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fitreserve_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_SECRET: ${APP_SECRET:-change_me_in_production}
      DATABASE_URL: mysql://${DB_USER:-fituser}:${DB_PASSWORD:-fitpassword}@db:3306/${DB_NAME:-fitreserve}
      JWT_SECRET_KEY: /var/www/html/config/jwt/private.pem
      JWT_PUBLIC_KEY: /var/www/html/config/jwt/public.pem
      JWT_PASSPHRASE: ${JWT_PASSPHRASE:-fitreserve_jwt_passphrase}
      JWT_TOKEN_TTL: 3600
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
      - jwt_keys:/var/www/html/config/jwt
    networks:
      - fitreserve_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fitreserve_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      API_URL: http://backend:8000
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - fitreserve_net

volumes:
  db_data:
  jwt_keys:
  backend_vendor:

networks:
  fitreserve_net:
    driver: bridge
